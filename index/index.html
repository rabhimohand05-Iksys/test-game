<!DOCTYPE html>
<html>
<head>
    <title>لعبة اختبار</title>
    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        button {
            padding: 15px 30px;
            font-size: 1.5rem;
            background: gold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: all 0.3s;
        }
        button:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 30px gold;
        }
    </style>
</head>
<body>
    <h1>🎮 Knapsack Game</h1>
    <p>صفحة اختبار بسيطة</p>
    <button onclick="alert('✅ اللعبة تعمل على الهاتف والحاسوب!')">
        اضغط هنا للاختبار
    </button>
</body>
</html>
